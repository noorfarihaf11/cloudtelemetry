<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scan QR — Mahasiswa</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      :root{
        --bg:#f4f5f9;--surface:#fff;--surface2:#f0f1f5;
        --border:#e2e4ec;--text:#1e2031;--muted:#6b7085;
        --accent:#4361ee;--accent-glow:rgba(67,97,238,.12);
        --success:#0ea371;--danger:#e5484d;--warn:#d97706;
        --radius:14px;--radius-sm:10px;
        --shadow:0 1px 3px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
        --shadow-md:0 4px 20px rgba(0,0,0,.08);
      }
      body{
        font-family:'Plus Jakarta Sans',-apple-system,sans-serif;
        background:var(--bg);color:var(--text);
        min-height:100vh;display:flex;flex-direction:column;align-items:center;
        -webkit-font-smoothing:antialiased;
      }
      .header{
        width:100%;padding:18px 24px;display:flex;align-items:center;
        justify-content:center;gap:10px;border-bottom:1px solid var(--border);
        background:var(--surface);position:sticky;top:0;z-index:10;
      }
      .header .logo{
        width:36px;height:36px;background:var(--success);border-radius:10px;
        display:flex;align-items:center;justify-content:center;
        font-weight:800;font-size:13px;color:#fff;
      }
      .header h1{font-size:17px;font-weight:700}
      .header .badge-role{
        position:absolute;right:20px;padding:5px 14px;border-radius:20px;
        font-size:11px;font-weight:700;background:rgba(14,163,113,.1);color:var(--success);
      }
      .container{width:100%;max-width:480px;padding:24px 16px 48px;flex:1}
      .card{
        background:var(--surface);border:1px solid var(--border);
        border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow);
      }
      .card-title{font-size:15px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:8px}
      .card-title .dot{width:8px;height:8px;border-radius:50%}
      .dot.blue{background:var(--accent)}.dot.green{background:var(--success)}.dot.red{background:var(--danger)}
      .form-group{margin-bottom:14px}
      .form-group label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
      .form-group input{
        width:100%;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);
        border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:inherit;
        outline:none;transition:.2s ease;
      }
      .form-group input::placeholder{color:var(--muted)}
      .form-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
      .btn{
        display:inline-flex;align-items:center;justify-content:center;gap:8px;
        width:100%;padding:13px 20px;border:none;border-radius:var(--radius-sm);
        font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:.2s ease;
      }
      .btn-success{background:var(--success);color:#fff}
      .btn-success:hover{opacity:.9}
      .btn-success:disabled{opacity:.4;cursor:not-allowed}
      .btn-outline{background:var(--surface);border:1px solid var(--border);color:var(--text)}
      .btn-outline:hover{background:var(--surface2)}
      .btn-sm{padding:10px 16px;font-size:13px}
      #scanner-box{width:100%;border-radius:var(--radius);overflow:hidden;margin-bottom:14px}
      .cam-notice{
        background:rgba(217,119,6,.06);border:1px solid rgba(217,119,6,.2);
        border-radius:var(--radius-sm);padding:14px;margin-bottom:14px;
        font-size:12px;color:var(--warn);line-height:1.6;display:none;
      }
      .cam-notice strong{display:block;margin-bottom:4px;font-size:13px}
      .result-card{
        background:rgba(14,163,113,.06);border:1px solid rgba(14,163,113,.2);
        border-radius:var(--radius);padding:20px;margin-bottom:16px;text-align:center;
      }
      .result-card .big-check{font-size:48px;margin-bottom:8px}
      .result-card .title{font-size:18px;font-weight:800;color:var(--success);margin-bottom:4px}
      .result-card .meta{font-size:13px;color:var(--muted);margin-top:4px}
      .status-badge{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:700;margin-top:8px}
      .status-badge.checked{background:rgba(14,163,113,.1);color:var(--success)}
      .status-badge.not-found{background:rgba(107,112,133,.1);color:var(--muted)}
      .toast-box{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px}
      .toast{padding:14px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;color:#fff;box-shadow:var(--shadow-md);animation:toastIn .3s ease-out;max-width:340px}
      .toast.success{background:var(--success)}.toast.error{background:var(--danger)}.toast.info{background:var(--accent)}
      @keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
      .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
      @keyframes spin{to{transform:rotate(360deg)}}
      @media(max-width:480px){.header .badge-role{display:none}}
    </style>
  </head>
  <body>

    <div class="header">
      <div class="logo">📷</div>
      <h1>Scan QR Presensi</h1>
      <span class="badge-role">🎓 Mahasiswa</span>
    </div>

    <div class="container">
      <!-- Identitas -->
      <div class="card">
        <div class="card-title"><span class="dot green"></span> Identitas Mahasiswa</div>
        <div class="form-group">
          <label>User ID / NIM</label>
          <input type="text" id="userId" placeholder="contoh: 12345678" />
        </div>
      </div>

      <!-- Scanner -->
      <div class="card">
        <div class="card-title"><span class="dot blue"></span> Scan QR Token</div>
        <div class="cam-notice" id="camNotice">
          <strong>⚠️ Kamera live tidak tersedia</strong>
          Akses kamera diblokir oleh iframe Google Apps Script.<br/>
          Gunakan tombol <strong>"📸 Foto QR"</strong> di bawah untuk memindai QR dari foto/kamera.
        </div>
        <div id="scanner-box"></div>
        <div style="display:flex;gap:8px;margin-bottom:14px">
          <button class="btn btn-outline btn-sm" id="btnStartScan" onclick="startScanner()" style="flex:1">📷 Buka Kamera</button>
          <button class="btn btn-outline btn-sm" id="btnStopScan" onclick="stopScanner()" style="flex:1;display:none">⏹ Tutup Kamera</button>
        </div>

        <!-- Foto QR: opens camera on mobile, file picker on desktop -->
        <div style="margin-bottom:14px">
          <label class="btn btn-outline btn-sm" style="cursor:pointer;position:relative">
            📸 Foto QR (dari kamera / file)
            <input type="file" accept="image/*" capture="environment" id="qrFileInput" onchange="scanFromFile(this)" style="position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer" />
          </label>
          <div id="scanFileStatus" style="font-size:12px;color:var(--muted);margin-top:6px;text-align:center"></div>
        </div>

        <div class="form-group">
          <label>Atau masukkan Token secara manual</label>
          <input type="text" id="manualToken" placeholder="paste token QR di sini..." />
        </div>
        <button class="btn btn-success" id="btnCheckin" onclick="doCheckin()">✅ Check-in Sekarang</button>
      </div>

      <div id="checkinResult" style="display:none"></div>

      <!-- Status -->
      <div class="card">
        <div class="card-title"><span class="dot red"></span> Cek Status Presensi</div>
        <div class="form-group">
          <label>Course ID</label>
          <input type="text" id="statusCourseId" placeholder="cloud-101" />
        </div>
        <div class="form-group">
          <label>Session ID</label>
          <input type="text" id="statusSessionId" placeholder="sesi-kuliah-001" />
        </div>
        <button class="btn btn-outline btn-sm" onclick="checkStatus()">🔍 Cek Status</button>
        <div id="statusResult" style="margin-top:14px"></div>
      </div>
    </div>

    <div class="toast-box" id="toastBox"></div>

    <script>
      var html5QrScanner = null;

      function showToast(msg, type) {
        var box = document.getElementById('toastBox');
        var t = document.createElement('div');
        t.className = 'toast ' + (type || 'info');
        t.textContent = msg;
        box.appendChild(t);
        setTimeout(function() { t.style.opacity = '0'; setTimeout(function() { t.remove(); }, 300); }, 3500);
      }

      function setLoading(id, on) {
        var btn = document.getElementById(id);
        if (on) { btn.disabled = true; btn._orig = btn.innerHTML; btn.innerHTML = '<span class="spinner"></span> Memproses...'; }
        else { btn.disabled = false; btn.innerHTML = btn._orig || btn.innerHTML; }
      }

      function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }

      // Auto-fill dari URL params
      (function() {
        var params = new URLSearchParams(window.location.search);
        var token = params.get('token');
        if (token) document.getElementById('manualToken').value = token;
        var courseId = params.get('course_id');
        if (courseId) document.getElementById('statusCourseId').value = courseId;
        var sessionId = params.get('session_id');
        if (sessionId) document.getElementById('statusSessionId').value = sessionId;
        if (token) showToast('Token dari QR berhasil dimuat! Isi NIM lalu Check-in.', 'success');
      })();

      // ═══ SCANNER ═══
      function startScanner() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          document.getElementById('camNotice').style.display = 'block';
          showToast('Kamera live tidak tersedia. Gunakan "📸 Foto QR".', 'error');
          return;
        }

        showToast('Meminta izin kamera...', 'info');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
          .then(function(stream) {
            stream.getTracks().forEach(function(track) { track.stop(); });
            var container = document.getElementById('scanner-box');
            container.innerHTML = '<div id="qr-reader" style="width:100%"></div>';

            html5QrScanner = new Html5Qrcode('qr-reader');
            html5QrScanner.start(
              { facingMode: 'environment' },
              { fps: 10, qrbox: { width: 220, height: 220 } },
              function(decodedText) { handleScanResult(decodedText); stopScanner(); },
              function() {}
            ).then(function() {
              document.getElementById('camNotice').style.display = 'none';
              document.getElementById('btnStartScan').style.display = 'none';
              document.getElementById('btnStopScan').style.display = 'inline-flex';
              showToast('Kamera aktif! Arahkan ke QR Code.', 'success');
            }).catch(function() {
              document.getElementById('camNotice').style.display = 'block';
              container.innerHTML = '';
              showToast('Gagal memulai scanner. Gunakan "📸 Foto QR".', 'error');
            });
          })
          .catch(function() {
            document.getElementById('camNotice').style.display = 'block';
            showToast('Kamera diblokir. Gunakan "📸 Foto QR" untuk scan.', 'error');
          });
      }

      // ─── SCAN FROM FILE / CAMERA PHOTO ───
      function scanFromFile(input) {
        if (!input.files || !input.files[0]) return;
        var file = input.files[0];
        var statusEl = document.getElementById('scanFileStatus');
        statusEl.textContent = '⏳ Memindai QR dari foto...';

        Html5Qrcode.scanFile(file, true)
          .then(function(decodedText) {
            handleScanResult(decodedText);
            statusEl.textContent = '✅ QR berhasil dipindai!';
            statusEl.style.color = 'var(--success)';
          })
          .catch(function() {
            statusEl.textContent = '❌ QR tidak terdeteksi. Coba foto lebih jelas.';
            statusEl.style.color = 'var(--danger)';
            showToast('QR tidak terdeteksi. Pastikan foto jelas.', 'error');
          });
        input.value = '';
      }

      // ─── HANDLE SCAN RESULT ───
      function handleScanResult(decodedText) {
        try {
          var url = new URL(decodedText);
          var token = url.searchParams.get('token');
          var courseId = url.searchParams.get('course_id');
          var sessionId = url.searchParams.get('session_id');
          if (token) document.getElementById('manualToken').value = token;
          if (courseId) document.getElementById('statusCourseId').value = courseId;
          if (sessionId) document.getElementById('statusSessionId').value = sessionId;
        } catch (e) {
          document.getElementById('manualToken').value = decodedText;
        }
        showToast('QR berhasil dipindai!', 'success');
      }

      function stopScanner() {
        if (html5QrScanner) {
          html5QrScanner.stop().then(function() { html5QrScanner.clear(); html5QrScanner = null; }).catch(function() {});
        }
        document.getElementById('scanner-box').innerHTML = '';
        document.getElementById('btnStartScan').style.display = 'inline-flex';
        document.getElementById('btnStopScan').style.display = 'none';
      }

      // ═══ CHECK-IN ═══
      function doCheckin() {
        var userId = document.getElementById('userId').value.trim();
        var token = document.getElementById('manualToken').value.trim();
        var courseId = document.getElementById('statusCourseId').value.trim();
        var sessionId = document.getElementById('statusSessionId').value.trim();

        if (!userId) { showToast('User ID / NIM wajib diisi!', 'error'); return; }
        if (!token) { showToast('Token QR wajib diisi!', 'error'); return; }

        setLoading('btnCheckin', true);

        var deviceId = localStorage.getItem('device_id');
        if (!deviceId) {
          deviceId = 'DEV-' + Math.random().toString(36).substring(2, 10).toUpperCase();
          localStorage.setItem('device_id', deviceId);
        }

        google.script.run
          .withSuccessHandler(function(result) {
            setLoading('btnCheckin', false);
            var el = document.getElementById('checkinResult');
            el.style.display = 'block';
            el.innerHTML =
              '<div class="result-card">' +
                '<div class="big-check">✅</div>' +
                '<div class="title">Check-in Berhasil!</div>' +
                '<div class="meta">ID: ' + esc(result.presence_id) + '</div>' +
                '<div class="meta">Status: ' + esc(result.status) + '</div>' +
              '</div>';
            showToast('Check-in berhasil!', 'success');
          })
          .withFailureHandler(function(err) {
            setLoading('btnCheckin', false);
            showToast('Error: ' + err.message, 'error');
          })
          .checkinPresence({
            qr_token: token, user_id: userId, device_id: deviceId,
            course_id: courseId, session_id: sessionId, ts: new Date().toISOString()
          });
      }

      // ═══ CEK STATUS ═══
      function checkStatus() {
        var userId = document.getElementById('userId').value.trim();
        var courseId = document.getElementById('statusCourseId').value.trim();
        var sessionId = document.getElementById('statusSessionId').value.trim();
        if (!userId || !courseId || !sessionId) { showToast('Semua field wajib diisi!', 'error'); return; }

        var el = document.getElementById('statusResult');
        el.innerHTML = '<p style="text-align:center;color:var(--muted)">⏳ Memuat...</p>';

        google.script.run
          .withSuccessHandler(function(result) {
            if (result.status === 'checked_in') {
              el.innerHTML = '<div style="text-align:center"><span class="status-badge checked">✅ Sudah Check-in</span><div style="margin-top:8px;font-size:12px;color:var(--muted)">Waktu: ' + (result.last_ts || '-') + '</div></div>';
            } else {
              el.innerHTML = '<div style="text-align:center"><span class="status-badge not-found">❌ Belum Check-in</span></div>';
            }
          })
          .withFailureHandler(function(err) {
            el.innerHTML = '<p style="text-align:center;color:var(--danger)">Error: ' + esc(err.message) + '</p>';
          })
          .getPresenceStatus({ user_id: userId, course_id: courseId, session_id: sessionId });
      }
    </script>
  </body>
</html>
